<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PDF Vorschau</title>
<!-- pdfmake: Bibliothek zum Erzeugen von PDFs direkt im Browser, ohne Server -->
<!-- integrity/crossorigin (SRI): Browser prüft den Hash vor der Ausführung, ein
     kompromittiertes CDN könnte damit keinen stillschweigend abgeänderten Code ausliefern. -->
<script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.10/build/pdfmake.min.js"
        integrity="sha384-vseuUuO/VRMn00lXYd5m/Pk4l/7RjMqhXGf6G0RALy+On0txYb39dQsUQDAd7q5L" crossorigin="anonymous"></script>
<!-- vfs_fonts: enthält die eingebetteten Roboto-Schriftarten die pdfmake benötigt -->
<script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.10/build/vfs_fonts.js"
        integrity="sha384-zmD5tDN2awbMigS/yVcxHObSsdXXKh/27Y/bSII38WfNl+D7O/aVCIteAXsLY3p3" crossorigin="anonymous"></script>
<style>
  /* Dunkler Seitenhintergrund damit das weiße PDF-Dokument gut hervortritt */
  body { margin:0; font-family:sans-serif; background:#444; display:flex; flex-direction:column; align-items:center; }
  /* Kopfleiste mit Titel und Download-Button */
  header { width:100%; background:#1a3a5c; color:#fff; padding:8px 20px; display:flex; align-items:center; gap:12px; box-sizing:border-box; }
  header h1 { margin:0; font-size:.95rem; }
  /* iframe zeigt das fertige PDF als eingebettete Vorschau an */
  iframe { margin:10px 0; border:none; box-shadow:0 4px 20px rgba(0,0,0,.6); }
  /* Lade-Hinweis der solange sichtbar ist bis das PDF fertig generiert wurde */
  .loading { color:#fff; padding:40px; font-size:1.1rem; }
</style>
</head>
<body>

<header>
  <h1>&#128196; Prüfprotokoll – PDF Vorschau (Musterdaten)</h1>
  <!-- Download-Button: löst den PDF-Download aus sobald das Dokument bereit ist -->
  <button onclick="downloadPDF()" style="margin-left:auto;padding:6px 16px;border:none;background:#f59e0b;border-radius:4px;cursor:pointer;font-weight:700;font-size:.9rem">
    ⬇ PDF herunterladen
  </button>
</header>

<!-- Lade-Anzeige während die PDF-Generierung im Hintergrund läuft -->
<div class="loading" id="loading">PDF wird generiert …</div>

<!-- iframe: zeigt das fertige PDF als Daten-URL direkt im Browser an -->
<iframe id="viewer" style="width:98vw;height:calc(100vh - 52px);display:none"></iframe>

<script>
// ── Fest hinterlegte Standard-Normen ──────────────────────────────────────────
// Diese Normen erscheinen immer im Protokoll – eigene Normen können
// im Webformular zusätzlich ergänzt werden und werden über normen_custom übermittelt.
const DEFAULT_NORMS = ['DIN VDE 0100-600','BetrSichV','DIN VDE 0701-0702','TRBS','DIN VDE 0165','DGUV 3','DIN VDE 0105'];

// ── Musterdaten für die Vorschau ──────────────────────────────────────────────
// Damit die Vorschau ohne ausgefülltes Formular funktioniert, verwende ich hier
// realistische Beispieldaten aus einem typischen Prüfeinsatz.
const DEMO = {

  // Allgemeine Kopfdaten der geprüften Anlage
  kopfdaten: {
    kunde:               'HH Energie Netze GmbH',
    station:             'Hauptverteilung HV-01',
    projektnummer:       'PRJ-2024-0042',
    stromverteilernummer:'VERT-B2-001',
    netzspannung:        '400',
    frequenz:            '50',
    netzform:            'TN',
    spannungsart:        'AC'
  },

  // Anlass der Prüfung – mehrere Werte können gleichzeitig zutreffen
  anlass: ['Neuanlage', 'Wiederholungsprüfung'],

  // Angewandte Normen – die restlichen aus DEFAULT_NORMS bleiben leer (offenes Kästchen)
  normen: ['DIN VDE 0100-600', 'DGUV 3', 'DIN VDE 0105'],
  normen_custom: [],

  // Besichtigung – Sichtprüfung aller relevanten Anlagenteile
  // wert-Werte: 'io' = in Ordnung | 'nio' = nicht in Ordnung | 'na' = nicht Bestandteil
  besichtigen: [
    { punkt:'Auswahl der Betriebsmittel',          wert:'io'  },
    { punkt:'Trenn- und Schaltgeräte',             wert:'io'  },
    { punkt:'Brandschottungen',                    wert:'na'  },
    { punkt:'Gebäudesystemtechnik',                wert:'io'  },
    { punkt:'Kabel, Leitungen, Stromschienen',     wert:'nio' },
    { punkt:'Kennzeichnung Stromkreis, BMK',       wert:'io'  },
    { punkt:'Kennzeichnung N- und PE- Leiter',     wert:'io'  },
    { punkt:'Leiterverbindungen',                  wert:'io'  },
    { punkt:'Schutz u. Überwachungseinrichtungen', wert:'io'  },
    { punkt:'Schutz gegen direktes Berühren',      wert:'io'  },
    { punkt:'Zugänglichkeit',                      wert:'na'  },
    { punkt:'Schutzpotentialausgleich',            wert:'io'  },
    { punkt:'Zus. Örtlich Potentialausgleich',     wert:'io'  },
    { punkt:'Dokumentation',                       wert:'nio' }
  ],

  // Erproben – Funktionsprüfung aller Betriebsmittel und Schutzeinrichtungen
  erproben: [
    { punkt:'Funktionsprüfung der Anlage',         wert:'io' },
    { punkt:'Trenn- und Schaltgeräte',             wert:'io' },
    { punkt:'Funktion Überwachungseinrichtungen',  wert:'io' },
    { punkt:'FI- Schutzschalter',                 wert:'io' },
    { punkt:'Kabel, Leitungen, Stromschienen',     wert:'io' },
    { punkt:'Rechtsdrehfeld Anlage',               wert:'na' },
    { punkt:'Drehrichtung Motoren',                wert:'na' }
  ],

  // Verwendete Messgeräte – bis zu 3 Geräte mit Seriennummer und Kalibrierungsdatum
  messgeraete: [
    { fabrikat:'Fluke',  typ:'1664 FC',  sn:'FL-2023-881', kalib:'2025-03-01' },
    { fabrikat:'Metrel', typ:'MI 3102H', sn:'MT-77221',    kalib:'2024-11-15' },
    { fabrikat:'',       typ:'',         sn:'',            kalib:'' }   // drittes Gerät nicht verwendet
  ],

  // Messprotokoll – eine Zeile pro Stromkreis mit allen gemessenen Werten
  messprotokoll: [
    { ziel:'Licht EG',    ltyp:'B16A', leiter:'3', qs:'2.5', usart:'LS', usin:'16', zi_ln:'0.42', zi_lpe:'0.38', riso_o:'>500', riso_m:'>500', rcd_art:'-', idn:'-',  imess:'-',  ta:'-',  ul:'-',  umess:'231' },
    { ziel:'Steckd. EG',  ltyp:'B16A', leiter:'3', qs:'2.5', usart:'FI', usin:'16', zi_ln:'0.45', zi_lpe:'0.41', riso_o:'>500', riso_m:'>500', rcd_art:'A', idn:'30', imess:'28', ta:'22', ul:'50', umess:'229' },
    { ziel:'Heizung EG',  ltyp:'C20A', leiter:'3', qs:'4.0', usart:'LS', usin:'20', zi_ln:'0.38', zi_lpe:'0.35', riso_o:'>500', riso_m:'>500', rcd_art:'-', idn:'-',  imess:'-',  ta:'-',  ul:'-',  umess:'230' },
    { ziel:'Licht OG',    ltyp:'B16A', leiter:'3', qs:'1.5', usart:'LS', usin:'16', zi_ln:'0.51', zi_lpe:'0.48', riso_o:'>500', riso_m:'>500', rcd_art:'-', idn:'-',  imess:'-',  ta:'-',  ul:'-',  umess:'232' },
    { ziel:'Steckd. OG',  ltyp:'B16A', leiter:'3', qs:'2.5', usart:'FI', usin:'16', zi_ln:'0.49', zi_lpe:'0.44', riso_o:'>500', riso_m:'>500', rcd_art:'A', idn:'30', imess:'27', ta:'21', ul:'50', umess:'230' },
    { ziel:'Klimaanlage', ltyp:'C16A', leiter:'3', qs:'2.5', usart:'LS', usin:'16', zi_ln:'0.44', zi_lpe:'0.40', riso_o:'>500', riso_m:'>500', rcd_art:'-', idn:'-',  imess:'-',  ta:'-',  ul:'-',  umess:'231' },
  ],

  // Gesamtergebnis der Prüfung
  pruefergebnis: 'bedingt',

  // Freitext für festgestellte Mängel und zusätzliche Hinweise
  bemerkungen: 'Kabel im EG-Bereich weist leichte Beschädigung der Isolierung auf – Austausch empfohlen. Dokumentation unvollständig, bitte nachreichen.',

  // Ort, Datum und Prüfer-Informationen für den Unterschriftsbereich
  unterschrift: { ort:'München', datum:'2024-06-15', pruefer:'Max Mustermann', signatur:'' }
};


// ══════════════════════════════════════════════════════════════════════════════
//  PDF AUFBAUEN
//  Wandelt das Formulardaten-Objekt in ein vollständiges pdfmake-Dokument um.
//  data    = ausgefüllte Formulardaten (oder DEMO-Daten für die Vorschau)
//  logoB64 = Firmenlogo als Base64-String (optional – Fallback: Firmenname als Text)
// ══════════════════════════════════════════════════════════════════════════════
function buildPDF(data, logoB64) {

  // Kurzbezeichnungen damit der Code übersichtlich bleibt
  const kd = data.kopfdaten     || {};   // Kopfdaten
  const an = data.anlass        || [];   // Anlass-Auswahl
  const no = data.normen        || [];   // gewählte Normen
  const be = data.besichtigen   || [];   // Besichtigungs-Prüfpunkte
  const er = data.erproben      || [];   // Erproben-Prüfpunkte
  const mg = data.messgeraete   || [];   // Messgeräte-Einträge
  const mp = data.messprotokoll || [];   // Messprotokoll-Zeilen
  const u  = data.unterschrift  || {};   // Unterschrift-Daten
  const pg = data.pruefergebnis || '';   // Prüfergebnis-Wert

  // Farbkonstanten für das Corporate Design
  const C  = '#1a3a5c';   // Primärfarbe (dunkles Blau) für Kopfzeilen und Abschnittsbalken
  const BG = '#dce8f5';   // Helles Blau für Beschriftungszellen in Stammdaten
  const LN = '#c8d8ea';   // Sehr helles Blau für alle Tabellenlinien

  // ── Kästchen zeichnen ─────────────────────────────────────────────────────
  // Zeichnet ein Kontrollkästchen direkt per Canvas-API von pdfmake.
  // Ich verwende Canvas statt Unicode-Zeichen, weil □ und ähnliche Symbole
  // in pdfmakes eingebettetem Roboto-Font nicht vorhanden sind und unsichtbar
  // gerendert werden würden.
  // v = true  → Kästchen mit schwarzem Kreuz (angekreuzt)
  // v = false → leeres Kästchen mit sichtbarem Rahmen (nicht angekreuzt)
  function cbBox(v) {
    const sz = 8;   // Kästchengröße in Punkten
    // Äußerer Rahmen – wird immer gezeichnet unabhängig vom Zustand
    const items = [{ type:'rect', x:0.5, y:0.5, w:sz, h:sz, lineWidth:1, lineColor:'#333' }];
    if (v) {
      // Kreuz: zwei diagonale Linien von Ecke zu Ecke zeichnen
      items.push({ type:'line', x1:2,    y1:2,    x2:sz-1, y2:sz-1, lineWidth:1.8, lineColor:'#000' });
      items.push({ type:'line', x1:sz-1, y1:2,    x2:2,    y2:sz-1, lineWidth:1.8, lineColor:'#000' });
    }
    return { canvas:items, width:sz+2, height:sz+2 };
  }

  // ── Tabellen-Layouts ──────────────────────────────────────────────────────
  // lineLayout: Standard-Layout für alle Tabellen ohne Kästchenspalten
  // (Stammdaten, Messgeräte, Prüfergebnis, Bemerkungen)
  // Zeilenhöhe: um ~20 % reduziert gegenüber dem Original (padding 2 → 1.5)
  const lineLayout = {
    hLineWidth: (i,n) => (i===0 || i===n.table.body.length) ? 0.8 : 0.4,  // Außenlinien dicker
    vLineWidth: ()    => 0.4,
    hLineColor: ()    => LN,
    vLineColor: ()    => LN,
    paddingTop:    () => 1.5,
    paddingBottom: () => 1.5,
    paddingLeft:   () => 3,
    paddingRight:  () => 3
  };

  // checkLayout: Layout für Besichtigen- und Erproben-Tabellen mit Kästchenspalten
  // Zeilenhöhe: exakt um 20 % reduziert (padding 2 → 1.6)
  const checkLayout = {
    hLineWidth: (i,n) => (i===0 || i===n.table.body.length) ? 0.8 : 0.4,
    vLineWidth: ()    => 0.4,
    hLineColor: ()    => LN,
    vLineColor: ()    => LN,
    paddingTop:    () => 1.0,
    paddingBottom: () => 1.0,
    paddingLeft:   () => 3,
    paddingRight:  () => 3
  };

  // ── Abschnittsüberschrift ─────────────────────────────────────────────────
  // Erzeugt einen blau gefüllten Balken als Trennüberschrift zwischen den Abschnitten.
  // keepWithNextN:1 stellt sicher dass der Titel nie allein am Seitenende steht.
  function secHead(title) {
    return {
      table:{ widths:['*'], body:[[{
        text:title, bold:true, fontSize:8.5, color:'#fff', fillColor:C, margin:[4,3,4,3]
      }]]},
      layout:'noBorders', margin:[0,6,0,2], keepWithNextN:1
    };
  }

  // ── Titelzeile ────────────────────────────────────────────────────────────
  // Rechts: Firmenlogo wenn geladen, sonst Firmenname als mehrzeiliger Text
  const titleRight = logoB64
    ? { image:logoB64, width:76, alignment:'right' }
    : { text:'MESA\nMember of\nFRIEDRICH VORWERK GROUP', fontSize:7, alignment:'right', color:C, bold:true };

  const titleRow = {
    columns:[
      { stack:[
          { text:'Prüfprotokoll', bold:true, fontSize:15, color:C },
          { text:'Über- und Fehlerstrom-Schutzeinrichtungen', bold:true, fontSize:9, color:C, margin:[0,2,0,0] }
        ], width:'*' },
      titleRight
    ],
    margin:[0,0,0,5]
  };

  // ── Stammdaten-Tabelle ────────────────────────────────────────────────────
  // Hilfsfunktion: erstellt eine zweispaltige Zeile mit je Beschriftung und Wert
  function fRow(l1,v1,l2,v2) {
    return [
      { text:l1, bold:true, fontSize:7.5, color:'#444', fillColor:BG, alignment:'left', verticalAlignment:'middle' },
      { text:v1||'', fontSize:8, alignment:'left', verticalAlignment:'middle' },
      { text:l2, bold:true, fontSize:7.5, color:'#444', fillColor:BG, alignment:'left', verticalAlignment:'middle' },
      { text:v2||'', fontSize:8, alignment:'left', verticalAlignment:'middle' }
    ];
  }
  const stammdaten = {
    table:{ widths:[80,'*',90,'*'], body:[
      fRow('Kunde:',            kd.kunde,            'Projektnummer:',     kd.projektnummer),
      fRow('Station / Anlage:', kd.station,          'Stromverteilernr.:', kd.stromverteilernummer),
      // Netzspannung wird mit Einheit und Frequenz zusammengesetzt
      fRow('Netzspannung:',
        (kd.netzspannung||'') + (kd.netzspannung?' V':'') + (kd.frequenz?' / '+kd.frequenz+' Hz':''),
        'Netzform:',
        (kd.netzform||'') + (kd.spannungsart?' ('+kd.spannungsart+')':'')
      ),
    ]},
    layout:lineLayout, margin:[0,0,0,4]
  };

  // ── Anlass der Prüfung ────────────────────────────────────────────────────
  // Alle möglichen Anlassarten – angekreuzt wenn im anlass-Array der Daten vorhanden
  const anlassItems = [
    ['Neuanlage',          'Neuanlage'],
    ['Änderung',           'Änderung'],
    ['Wiederholungsprüfung','Wiederholungsprüfung'],
    ['Instandsetzung',     'Instandsetzung'],
    ['Sonstiges',          'Sonstiges']
  ];
  const anlassBlock = {
    // Alle Anlassarten nebeneinander in einer Zeile
    columns: anlassItems.map(([v,l]) => ({
      // Pro Anlass: Kästchen links + Beschriftungstext rechts
      columns:[
        { ...cbBox(an.includes(v)), margin:[0,1,0,0] },
        { text:l, fontSize:8, margin:[0,1,0,0] }
      ],
      columnGap:4, width:'auto', margin:[0,0,12,0]
    })),
    margin:[0,0,0,4]
  };

  // ── Angewandte Normen ─────────────────────────────────────────────────────
  // Alle Normen (Standard + eigene) werden auf zwei gleichbreite Spalten aufgeteilt
  const normList = [...DEFAULT_NORMS, ...(data.normen_custom||[])];
  const half = Math.ceil(normList.length / 2);   // Schnittpunkt für die Aufteilung
  const normBlock = {
    columns:[
      {
        // Linke Spalte: erste Hälfte der Normen
        stack: normList.slice(0,half).map(n => ({
          columns:[
            { ...cbBox(no.includes(n)), margin:[0,1,0,0] },
            { text:n, fontSize:8, margin:[0,1,0,0] }
          ],
          columnGap:4, margin:[0,1,0,2]
        })),
        width:'50%'
      },
      {
        // Rechte Spalte: zweite Hälfte der Normen
        stack: normList.slice(half).map(n => ({
          columns:[
            { ...cbBox(no.includes(n)), margin:[0,1,0,0] },
            { text:n, fontSize:8, margin:[0,1,0,0] }
          ],
          columnGap:4, margin:[0,1,0,2]
        })),
        width:'50%'
      }
    ],
    margin:[0,0,0,4]
  };

  // ── Besichtigen-Tabelle ───────────────────────────────────────────────────
  // Kopfzeile mit blau gefüllten Spaltenüberschriften
  const besBody = [[
    { text:'Besichtigen',                bold:true, fontSize:8, color:'#fff', fillColor:C, alignment:'left', verticalAlignment:'middle' },
    { text:'in Ordnung',                 bold:true, fontSize:7.5,  color:'#fff', fillColor:C, alignment:'left', verticalAlignment:'middle' },
    { text:'nicht in Ordnung',           bold:true, fontSize:7.5,  color:'#fff', fillColor:C, alignment:'left', verticalAlignment:'middle' },
    { text:'nicht Bestandteil\nder Prüfung', bold:true, fontSize:7, color:'#fff', fillColor:C, alignment:'left', verticalAlignment:'middle' }
  ]];
  be.forEach((r,i) => {
    const bg = i%2===0 ? '#f4f8fd' : '#fff';   // abwechselnde Streifenfärbung

    // cc: Hilfsfunktion für eine zentrierte Kästchen-Zelle
    // Die leeren width:'*' Spalten links und rechts zentrieren das Kästchen in der Zelle
    const cc = v => ({
      columns:[
        { width:'*', text:'' },
        { ...cbBox(v), margin:[0,1.3,0,0] },
        { width:'*', text:'' }
      ],
      fillColor:bg,
      margin:[0,1.5,0,1.5]
    });

    besBody.push([
      { text:r.punkt, fontSize:8, fillColor:bg, alignment:'left', verticalAlignment:'middle' },
      cc(r.wert==='io'),    // in Ordnung
      cc(r.wert==='nio'),   // nicht in Ordnung
      cc(r.wert==='na')     // nicht Bestandteil
    ]);
  });
  // Spaltenbreiten: Prüfpunkt-Spalte nimmt den Restplatz, Kästchenspalten sind fest
  const besTable = {
    table:{ widths:['*',54,62,76], body:besBody, dontBreakRows:true },
    layout:checkLayout, margin:[0,0,0,4]
  };

  // ── Erproben-Tabelle ──────────────────────────────────────────────────────
  // Identischer Aufbau wie die Besichtigen-Tabelle – nur andere Prüfpunkte
  const erpBody = [[
    { text:'Erproben',                   bold:true, fontSize:8, color:'#fff', fillColor:C, alignment:'left', verticalAlignment:'middle' },
    { text:'in Ordnung',                 bold:true, fontSize:7.5,  color:'#fff', fillColor:C, alignment:'left', verticalAlignment:'middle' },
    { text:'nicht in Ordnung',           bold:true, fontSize:7.5,  color:'#fff', fillColor:C, alignment:'left', verticalAlignment:'middle' },
    { text:'nicht Bestandteil\nder Prüfung', bold:true, fontSize:7, color:'#fff', fillColor:C, alignment:'left', verticalAlignment:'middle' }
  ]];
  er.forEach((r,i) => {
    const bg = i%2===0 ? '#f4f8fd' : '#fff';
    const cc = v => ({
      columns:[
        { width:'*', text:'' },
        { ...cbBox(v), margin:[0,1.3,0,0] },
        { width:'*', text:'' }
      ],
      fillColor:bg,
      margin:[0,1.5,0,1.5]
    });
    erpBody.push([
      { text:r.punkt, fontSize:8, fillColor:bg, alignment:'left', verticalAlignment:'middle' },
      cc(r.wert==='io'),
      cc(r.wert==='nio'),
      cc(r.wert==='na')
    ]);
  });
  const erpTable = {
    table:{ widths:['*',54,62,76], body:erpBody, dontBreakRows:true },
    layout:checkLayout, margin:[0,0,0,4]
  };

  // ── Messgeräte-Kärtchen ───────────────────────────────────────────────────
  // Jedes Messgerät bekommt ein eigenes kleines Tabellenkärtchen mit 5 Zeilen
  function mgBlock(m, nr) {
    return {
      table:{ widths:[42,'*'], body:[
        // Kopfzeile mit blauem Hintergrund und Gerätenummer
        [{ text:`Messgerät ${nr}`, bold:true, fontSize:7.5, color:'#fff', fillColor:C, colSpan:2, margin:[2,2,2,2], alignment:'left', verticalAlignment:'middle' }, {}],
        [{ text:'Fabrikat:',  bold:true, fontSize:7.5, fillColor:BG, alignment:'left', verticalAlignment:'middle' }, { text:m.fabrikat||' ', fontSize:8, alignment:'left', verticalAlignment:'middle' }],
        [{ text:'Typ:',       bold:true, fontSize:7.5, fillColor:BG, alignment:'left', verticalAlignment:'middle' }, { text:m.typ||' ',      fontSize:8, alignment:'left', verticalAlignment:'middle' }],
        [{ text:'SN-Nr.:',    bold:true, fontSize:7.5, fillColor:BG, alignment:'left', verticalAlignment:'middle' }, { text:m.sn||' ',       fontSize:8, alignment:'left', verticalAlignment:'middle' }],
        [{ text:'l. Kalib.:', bold:true, fontSize:7.5, fillColor:BG, alignment:'left', verticalAlignment:'middle' }, { text:m.kalib||' ',    fontSize:8, alignment:'left', verticalAlignment:'middle' }],
      ]},
      layout:lineLayout
    };
  }
  // Alle drei Messgeräte-Kärtchen nebeneinander mit kleinen Abstandshaltern
  const mgSection = {
    columns:[
      { ...mgBlock(mg[0]||{},1), width:'*' }, { width:8, text:'' },
      { ...mgBlock(mg[1]||{},2), width:'*' }, { width:8, text:'' },
      { ...mgBlock(mg[2]||{},3), width:'*' }
    ]
  };

  // ── Prüfergebnis-Block ────────────────────────────────────────────────────
  // Drei Auswahlmöglichkeiten in einer zweispaltigen Tabelle
  const pgBlock = {
    table:{ widths:['*','*'], body:[[
      // Linke Zelle: Mangelfrei und Bedingt i.O. untereinander
      { stack:[
          { columns:[{ ...cbBox(pg==='io'||pg==='mangelfrei'), margin:[0,1,0,0] }, { text:'Prüfergebnis Mangelfrei', fontSize:8.5, margin:[4,1,0,0] }], columnGap:0, margin:[0,0,0,4] },
          { columns:[{ ...cbBox(pg==='nio'||pg==='bedingt'),   margin:[0,1,0,0] }, { text:'Mängel / Bedingt i.O.',   fontSize:8.5, margin:[4,1,0,0] }], columnGap:0 }
        ]},
      // Rechte Zelle: Verweis auf Folgeblatt
      { columns:[{ ...cbBox(pg==='folgeblatt'), margin:[0,1,0,0] }, { text:'siehe Folgeblatt (-blätter)', fontSize:8.5, margin:[4,1,0,0] }], columnGap:0 }
    ]]},
    layout:lineLayout, margin:[0,0,0,4]
  };

  // Bemerkungsfeld mit Mindesthöhe damit es auch bei leerem Inhalt nicht verschwindet
  const bemBlock = {
    table:{ widths:['*'], body:[[
      { stack:[
          { text:'Bemerkungen / Mängel:', bold:true, fontSize:8 },
          { text:data.bemerkungen||'', fontSize:8, margin:[0,3,0,0] }
        ], minHeight:36 }
    ]]},
    layout:lineLayout, margin:[0,0,0,6]
  };

  // ── Unterschrift-Bereich ──────────────────────────────────────────────────
  const fmtDatum = d => d ? d.split('-').reverse().join('.') : '';

  const mkLine = () => ({ canvas:[{ type:'line', x1:0, y1:0, x2:220, y2:0, lineWidth:0.5, lineColor:'#555' }] });

  const sigBlock = {
    table:{
      widths:['*', 16, '*'],
      body:[
        // Zeile 1: Beschriftungen
        [
          { text:'Ort, Datum:', bold:true, fontSize:8 },
          { text:'' },
          { text:'Name Prüfer / Druckschrift / Unterschrift:', bold:true, fontSize:8 }
        ],
        // Zeile 2+3: 2 Leerzeilen Abstand
        [ { text:'', margin:[0,8,0,0] }, { text:'' }, { text:'', margin:[0,8,0,0] } ],
        [ { text:'' }, { text:'' }, { text:'' } ],
        // Zeile 4: München+Datum links, Prüfername rechts (gleiche Höhe)
        [
          { text: u.ort ? (u.ort + (u.datum ? ', ' + fmtDatum(u.datum) : '')) : '', fontSize:9 },
          { text:'' },
          { text:u.pruefer||'', fontSize:9 }
        ],
        // Zeile 5: Linie links und rechts (gleiche Höhe)
        [
          { stack:[ mkLine(), { text:'Ort, Datum', fontSize:7, color:'#888', margin:[0,1,0,0] } ] },
          { text:'' },
          u.signatur && u.signatur.startsWith('data:image/')
            ? { image:u.signatur, width:160, height:52 }
            : { stack:[ mkLine(), { text:'Druckschrift / Unterschrift', fontSize:7, color:'#888', margin:[0,1,0,0] } ] }
        ]
      ]
    },
    layout:'noBorders',
    margin:[0,6,0,0]
  };

  // ── Messprotokoll-Layout ──────────────────────────────────────────────────
  // Eigenes Layout für die große Messprotokoll-Tabelle – etwas enger als lineLayout
  // Zeilenhöhe: 1.8 pt padding (um +20 % gegenüber dem zwischenzeitlich reduzierten Wert erhöht)
  const mpLayout = {
    hLineWidth: (i) => i<=2 ? 0.8 : 0.4,   // Die ersten zwei Kopfzeilen-Linien sind dicker
    vLineWidth: ()  => 0.4,
    hLineColor: ()  => LN,
    vLineColor: ()  => LN,
    paddingTop:    () => 2,
    paddingBottom: () => 2,
    paddingLeft:   () => 2,
    paddingRight:  () => 2
  };

  // Farbkonstanten für die drei farblich gruppierten Spaltenblöcke im Messprotokoll
  const CH  = '#1a3a5c';   // Dunkelblau  – allgemeine Spalten
  const CHR = '#1e5799';   // Mittelblau  – Isolationswiderstand (Riso)
  const CHG = '#1a5c3a';   // Dunkelgrün  – RCD / Fehlerstrom-Spalten

  // Erste Kopfzeile: Spaltengruppen die sich über mehrere Spalten erstrecken (colSpan)
  const mpHdr1 = [
    { text:'Stromkreis',                          bold:true, fontSize:7, color:'#fff', fillColor:CH,  rowSpan:2, alignment:'left', verticalAlignment:'middle' },
    { text:'Leitung / Kabel',                     bold:true, fontSize:7, color:'#fff', fillColor:CH,  colSpan:3, alignment:'left', verticalAlignment:'middle' }, {},{},
    { text:'Überstrom-Schutzeinrichtung',          bold:true, fontSize:7, color:'#fff', fillColor:CH,  colSpan:4, alignment:'left', verticalAlignment:'middle' }, {},{},{},
    { text:'Riso (MΩ)',                           bold:true, fontSize:7, color:'#fff', fillColor:CHR, colSpan:2, alignment:'left', verticalAlignment:'middle' }, {},
    { text:'Fehlerstrom-Schutzeinrichtung (RCD)', bold:true, fontSize:7, color:'#fff', fillColor:CHG, colSpan:6, alignment:'left', verticalAlignment:'middle' }, {},{},{},{},{}
  ];

  // Zweite Kopfzeile: Einzelne Spaltenbezeichnungen
  const mpHdr2 = [
    {},
    { text:'Typ',         bold:true, fontSize:6.5, color:'#fff', fillColor:CH,  alignment:'left', verticalAlignment:'middle' },
    { text:'Ltr',         bold:true, fontSize:6.5, color:'#fff', fillColor:CH,  alignment:'left', verticalAlignment:'middle' },
    { text:'mm²',         bold:true, fontSize:6.5, color:'#fff', fillColor:CH,  alignment:'left', verticalAlignment:'middle' },
    { text:'Art',         bold:true, fontSize:6.5, color:'#fff', fillColor:CH,  alignment:'left', verticalAlignment:'middle' },
    { text:'In (A)',      bold:true, fontSize:6.5, color:'#fff', fillColor:CH,  alignment:'left', verticalAlignment:'middle' },
    { text:'Zi\nL-N (Ω)', bold:true, fontSize:6.5, color:'#fff', fillColor:CH,  alignment:'left', verticalAlignment:'middle' },
    { text:'Zi\nL-PE(Ω)', bold:true, fontSize:6.5, color:'#fff', fillColor:CH,  alignment:'left', verticalAlignment:'middle' },
    { text:'ohne\nVerbr.',bold:true, fontSize:6.5, color:'#fff', fillColor:CHR, alignment:'left', verticalAlignment:'middle' },
    { text:'mit\nVerbr.', bold:true, fontSize:6.5, color:'#fff', fillColor:CHR, alignment:'left', verticalAlignment:'middle' },
    { text:'In/Art\n(A)', bold:true, fontSize:6.5, color:'#fff', fillColor:CHG, alignment:'left', verticalAlignment:'middle' },
    { text:'IDn\n(mA)',   bold:true, fontSize:6.5, color:'#fff', fillColor:CHG, alignment:'left', verticalAlignment:'middle' },
    { text:'Imess\n(mA)', bold:true, fontSize:6.5, color:'#fff', fillColor:CHG, alignment:'left', verticalAlignment:'middle' },
    { text:'ta\n(ms)',    bold:true, fontSize:6.5, color:'#fff', fillColor:CHG, alignment:'left', verticalAlignment:'middle' },
    { text:'UL\n(V)',     bold:true, fontSize:6.5, color:'#fff', fillColor:CHG, alignment:'left', verticalAlignment:'middle' },
    { text:'Umess\n(V)',  bold:true, fontSize:6.5, color:'#fff', fillColor:CHG, alignment:'left', verticalAlignment:'middle' }
  ];

  // Messprotokoll-Datenzeilen mit abwechselnder Streifenfärbung für bessere Lesbarkeit
  const mpRows = mp.map((r,i) => [
    r.ziel||'', r.ltyp||'', r.leiter||'', r.qs||'',
    r.usart||'', r.usin||'', r.zi_ln||'', r.zi_lpe||'',
    r.riso_o||'', r.riso_m||'',
    r.rcd_art||'', r.idn||'', r.imess||'', r.ta||'', r.ul||'', r.umess||''
  ].map(v => ({ text:v, fontSize:7, alignment:'left', verticalAlignment:'middle', fillColor: i%2===0 ? '#f4f8fd' : '#fff' })));

  // ── Rückgabe: vollständiges pdfmake-Dokumentobjekt ────────────────────────
  return {
    pageSize: 'A4',
    pageOrientation: 'portrait',
    pageMargins: [28, 54, 28, 44],   // [links, oben, rechts, unten] – Platz für Kopf/Fußzeile

    // Kopfzeile auf jeder Seite: Protokolltitel links, Seitennummer rechts
    header: (page, count) => ({
      columns:[
        { text:`Prüfprotokoll | ${kd.station||''}`, fontSize:7, color:'#777', margin:[28,18,0,0] },
        { text:`Seite ${page} von ${count}`,         fontSize:7, color:'#777', margin:[0,18,28,0], alignment:'right' }
      ]
    }),

    // Fußzeile auf jeder Seite: Erstelldatum links, Prüfername rechts
    footer: (page, count) => ({
      columns:[
        { text:`Erstellt: ${new Date().toLocaleDateString('de-DE')}`, fontSize:6.5, color:'#bbb', margin:[28,8,0,0] },
        { text:`Prüfer: ${u.pruefer||''}`,                            fontSize:6.5, color:'#bbb', margin:[0,8,28,0], alignment:'right' }
      ]
    }),

    // Seiteninhalt in der Reihenfolge wie er im PDF erscheinen soll
    content:[
      titleRow,
      // Trennlinie unter dem Titel
      { canvas:[{ type:'line', x1:0, y1:0, x2:535, y2:0, lineWidth:1, lineColor:C }], margin:[0,0,0,5] },
      stammdaten,
      secHead('Anlass der Prüfung'), anlassBlock,
      secHead('Prüfung durchgeführt nach'), normBlock,
      besTable,
      erpTable,
      secHead('Verwendete Messgeräte'), mgSection,
      // Prüfergebnis beginnt auf einer neuen Seite damit es nicht abgehackt wird
      { ...secHead('Prüfergebnis'), pageBreak:'before' }, pgBlock, bemBlock,
      // Messprotokoll-Überschrift als blauer Balken (gleicher Stil wie secHead)
      { table:{ widths:['*'], body:[[{ text:'Messprotokoll', bold:true, fontSize:8.5, color:'#fff', fillColor:C, margin:[4,3,4,3] }]] },
        layout:'noBorders', margin:[0,6,0,2] },
      // Messprotokoll-Tabelle mit 16 Spalten und 2 gruppierten Kopfzeilen
      { table:{
          widths:['*',28,20,20,24,20,30,30,26,26,24,20,26,20,16,26],
          headerRows:2,
          dontBreakRows:true,
          body:[mpHdr1, mpHdr2, ...mpRows]
        }, layout:mpLayout },
      secHead('Ort, Datum und Unterschrift'), sigBlock
    ],

    defaultStyle:{ font:'Roboto', fontSize:9 }
  };
}

// ── PDF herunterladen ─────────────────────────────────────────────────────────
// pdfmake mutiert beim Rendern (getDataUrl/download/…) interne Layout-Daten
// direkt im übergebenen docDefinition-Objekt. Wird dasselbe docDefinition-Objekt
// für mehrere Render-Aufrufe wiederverwendet (hier: erst Vorschau, dann Download),
// führt das zu einem verfälschten zweiten Rendering (z.B. verschobene Kästchen).
// Deshalb bauen wir für den Download ein komplett frisches docDefinition-Objekt.
let _logoB64 = null;
function downloadPDF() {
  pdfMake.createPdf(buildPDF(DEMO, _logoB64)).download('Pruefprotokoll_Vorschau.pdf');
}

// ── Seitenstart ───────────────────────────────────────────────────────────────
// Beim Laden der Seite: erst das Firmenlogo laden, dann PDF generieren und im iframe anzeigen
window.addEventListener('load', async () => {
  try {
    // Firmenlogo als Base64 laden – schlägt es fehl wird stattdessen der Firmenname als Text angezeigt
    const r   = await fetch('mesa_logo.jpg');
    const buf = await r.arrayBuffer();
    _logoB64  = 'data:image/jpeg;base64,' + btoa(String.fromCharCode(...new Uint8Array(buf)));
  } catch(e) {}   // kein Logo gefunden → kein Problem, Fallback in buildPDF greift

  // PDF mit Musterdaten erstellen und als Daten-URL rendern
  const pdfDocGen = pdfMake.createPdf(buildPDF(DEMO, _logoB64));
  pdfDocGen.getDataUrl(url => {
    document.getElementById('loading').style.display = 'none';   // Lade-Hinweis ausblenden
    const iframe = document.getElementById('viewer');
    iframe.src   = url;
    iframe.style.display = 'block';   // iframe sichtbar machen
  });
});
</script>
</body>
</html>
