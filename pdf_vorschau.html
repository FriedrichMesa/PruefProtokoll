function buildPDF(data, logoB64) {

  const BG = "#dce8f5";
  const LN = "#c8d8ea";
  const PAGE_MARGIN_LR = 28;
  const CONTENT_WIDTH = 595.28 - PAGE_MARGIN_LR * 2;
  function cbBox(v) {
    const sz = 8;
    const items = [ {
      type: "rect",
      x: .5,
      y: .5,
      w: sz,
      h: sz,
      lineWidth: 1,
      lineColor: "#333"
    } ];
    if (v) {
      items.push({
        type: "line",
        x1: 2,
        y1: 2,
        x2: sz - 1,
        y2: sz - 1,
        lineWidth: 1.8,
        lineColor: "#000"
      });
      items.push({
        type: "line",
        x1: sz - 1,
        y1: 2,
        x2: 2,
        y2: sz - 1,
        lineWidth: 1.8,
        lineColor: "#000"
      });
    }
    return {
      canvas: items,
      width: sz + 2,
      height: sz + 2
    };
  }
  const lineLayout = {
    hLineWidth: (i, n) => i === 0 || i === n.table.body.length ? .8 : .4,
    vLineWidth: () => .4,
    hLineColor: () => LN,
    vLineColor: () => LN,
    paddingTop: () => 1.5,
    paddingBottom: () => 1.5,
    paddingLeft: () => 3,
    paddingRight: () => 3
  };
  const checkLayout = {
    hLineWidth: (i, n) => i === 0 || i === n.table.body.length ? .8 : .4,
    vLineWidth: () => .4,
    hLineColor: () => LN,
    vLineColor: () => LN,
    paddingTop: () => 1,
    paddingBottom: () => 1,
    paddingLeft: () => 3,
    paddingRight: () => 3
  };
  function secHead(title) {
    return {
      table: {
        widths: [ "*" ],
        body: [ [ {
          text: title,
          bold: true,
          fontSize: 8.5,
          color: "#fff",
          fillColor: C,
          margin: [ 4, 3, 4, 3 ]
        } ] ]
      },
      layout: "noBorders",
      margin: [ 0, 6, 0, 2 ],
      keepWithNextN: 1
    };
  }
  const titleRight = logoB64 ? {
    image: logoB64,
    width: 76,
    alignment: "right"
  } : {
    text: "",
    width: 76

      stack: [ {
        text: "Prüfprotokoll",
        bold: true,
        fontSize: 15,
        color: C

        fontSize: 9,
        color: C,
        margin: [ 0, 2, 0, 0 ]
      } ],
      width: "*"
    }, titleRight ],
    margin: [ 0, 0, 0, 5 ]
  };
  function fRow(l1, v1, l2, v2) {
    return [ {
      text: l1,
      bold: true,
      fontSize: 7.5,
      color: "#444",
      fillColor: BG,
      alignment: "left",
      verticalAlignment: "middle"
    }, {
      text: v1 || "",
      fontSize: 8,
      alignment: "left",
      verticalAlignment: "middle"
    }, {
      text: l2,
      bold: true,
      fontSize: 7.5,
      color: "#444",
      fillColor: BG,
      alignment: "left",
      verticalAlignment: "middle"
    }, {
      text: v2 || "",

      alignment: "left",
      verticalAlignment: "middle"

  const stammdaten = {
    table: {

    const cc = v => ({

  const erpTable = {

  function mgBlock(m, nr) {

  const pgBlock = {

        fontSize: 9
      }, {

      }, {
